version: "3.9"

services:

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  worker:
    build: ./worker
    env_file:
      - ./worker/.env
    depends_on:
      - redis

  redis:
    image: redis:latest
    ports:
      - "6379:6379"