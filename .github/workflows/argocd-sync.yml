name: Update k8s Manifests and Trigger ArgoCD Sync

on:
  push:
    branches:
      - main
    paths:
      - "k8s/**"
      - ".github/workflows/argocd-sync.yml"

jobs:
  argocd-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update backend image tag
        env:
          BACKEND_TAG: ${{ github.sha }}
        run: |
          sed -i "s|bushrakhan9321/ai-task-backend:[^ ]*|bushrakhan9321/ai-task-backend:$BACKEND_TAG|g" k8s/backend-deployment.yaml

      - name: Update frontend image tag
        env:
          FRONTEND_TAG: ${{ github.sha }}
        run: |
          sed -i "s|bushrakhan9321/ai-task-frontend:[^ ]*|bushrakhan9321/ai-task-frontend:$FRONTEND_TAG|g" k8s/frontend-deployment.yaml

      - name: Update worker image tag
        env:
          WORKER_TAG: ${{ github.sha }}
        run: |
          sed -i "s|bushrakhan9321/ai-task-worker:[^ ]*|bushrakhan9321/ai-task-worker:$WORKER_TAG|g" k8s/worker-deployment.yaml

      - name: Commit and push updated manifests
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add k8s/*.yaml
          git commit -m "ci: update image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push

      - name: ArgoCD App Sync
        run: |
          # Install argocd CLI
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

          # Sync application (requires ARGOCD_SERVER and ARGOCD_AUTH_TOKEN secrets)
          argocd app sync ai-task-platform --server=${{ secrets.ARGOCD_SERVER }} --auth-token=${{ secrets.ARGOCD_AUTH_TOKEN }}
        continue-on-error: true
