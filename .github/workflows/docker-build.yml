name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "worker/**"
      - ".github/workflows/docker-build.yml"

env:
  PUBLISH_IMAGES: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend (local fallback)
        if: env.PUBLISH_IMAGES != 'true'
        run: docker build -t ai-task-backend:latest ./backend

      - name: Login to Docker Hub
        if: env.PUBLISH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend (Docker Hub)
        if: env.PUBLISH_IMAGES == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-task-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-task-backend:${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend (local fallback)
        if: env.PUBLISH_IMAGES != 'true'
        run: docker build -t ai-task-frontend:latest ./frontend

      - name: Login to Docker Hub
        if: env.PUBLISH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend (Docker Hub)
        if: env.PUBLISH_IMAGES == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend:${{ github.sha }}

  build-worker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build worker (local fallback)
        if: env.PUBLISH_IMAGES != 'true'
        run: docker build -t ai-task-worker:latest ./worker

      - name: Login to Docker Hub
        if: env.PUBLISH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push worker (Docker Hub)
        if: env.PUBLISH_IMAGES == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-task-worker:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-task-worker:${{ github.sha }}
