apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: ai-task-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: bushrakhan9321/ai-task-backend:716d5fe5c0a24a3fa1679b7f564eb24ab27dbe6e
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5000

          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: ai-task-platform-secrets
                  key: MONGO_URI

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-task-platform-secrets
                  key: JWT_SECRET

---
apiVersion: v1
kind: Service

metadata:
  name: backend-service
  namespace: ai-task-platform

spec:
  selector:
    app: backend

  ports:
    - port: 5000
      targetPort: 5000
